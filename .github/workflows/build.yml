name: Build TeamsNotifier

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/TeamsNotifier/TeamsNotifier.csproj

      - name: Publish
        run: dotnet publish src/TeamsNotifier/TeamsNotifier.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeamsNotifier
          path: src/TeamsNotifier/bin/Release/net8.0-windows/win-x64/publish
